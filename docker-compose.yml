services:

  # ── FlareSolverr ──────────────────────────────────────────────────────────────
  # Bypasses Cloudflare protection on indexers. Jackett detects it automatically
  # once configured: Settings → FlareSolverr API URL → http://flaresolverr:8191
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
    networks:
      - heartstream-network

  # ── Jackett ───────────────────────────────────────────────────────────────────
  # Torrent indexer proxy — required by Jackettio to query TPB, YTS, EZTV, etc.
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
      - RUN_OPTS=-x    
    ports:
      - "9117:9117"
    volumes:
      - ./config/jackett:/config
    networks:
      - heartstream-network

  # ── Jackettio ─────────────────────────────────────────────────────────────────
  # Bridges torrent indexers + Real-Debrid into a single stream API.
  jackettio:
    build: https://github.com/arvida42/jackettio.git
    container_name: jackettio
    restart: unless-stopped
    depends_on:
      - jackett
      - flaresolverr
    environment:
      - PORT=4000
      - JACKETT_URL=http://jackett:9117
      - JACKETT_API_KEY=${JACKETT_API_KEY:-5984118c7b886ba38420de8b0208f87c}
      - TMDB_ACCESS_TOKEN=${TMDB_ACCESS_TOKEN}
      - DATA_FOLDER=/data
    volumes:
      - jackettio-data:/data
    networks:
      - heartstream-network

  # ── HeartStream ───────────────────────────────────────────────────────────────
  heartstream:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: heartstream-v2
    restart: unless-stopped
    depends_on:
      - jackett
      - jackettio
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_ACCESS_TOKEN=${TMDB_ACCESS_TOKEN}
      - JACKETTIO_URL=http://jackettio:4000
      - REALDEBRID_API_KEY=${REALDEBRID_API_KEY}
      - JACKETTIO_INDEXERS=${JACKETTIO_INDEXERS:-thepiratebay,yts,eztv,therarbg}
      - JACKETTIO_QUALITIES=${JACKETTIO_QUALITIES:-720,1080,2160}
      - JACKETTIO_BLACKLIST=${JACKETTIO_BLACKLIST:-}
    volumes:
      - heartstream-data:/data
    networks:
      - heartstream-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  jackettio-data:
  heartstream-data:

networks:
  heartstream-network:
    driver: bridge
