services:

  # ── Jackett ───────────────────────────────────────────────────────────────────
  # Torrent indexer proxy. Pre-seeded with a known API key (see config/jackett/).
  # After first deploy, visit http://your-server:9117 to add indexers:
  #   Recommended: The Pirate Bay, YTS, EZTV, TheRARBG
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
    volumes:
      - /opt/heartstream/jackett:/config
    ports:
      - "9117:9117"
    networks:
      - heartstream-network

  # ── MediaFlow Proxy ───────────────────────────────────────────────────────────
  # Proxies and remuxes RD streams to HLS so the browser <video> tag can play
  # any format (MKV, AVI, etc.) natively. Exposed on port 8888.
  # Set MEDIAFLOW_PUBLIC_URL=http://<your-server-ip>:8888 in your stack env vars.
  mediaflow:
    image: mhdzumair/mediaflow-proxy
    container_name: mediaflow
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - API_PASSWORD=${MEDIAFLOW_API_PASSWORD:-heartstream}
    networks:
      - heartstream-network

  # ── Jackettio ─────────────────────────────────────────────────────────────────
  jackettio:
    build: https://github.com/arvida42/jackettio.git
    container_name: jackettio
    restart: unless-stopped
    depends_on:
      - jackett
      - mediaflow
    environment:
      - PORT=4000
      - JACKETT_URL=http://jackett:9117
      - JACKETT_API_KEY=${JACKETT_API_KEY:-5984118c7b886ba38420de8b0208f87c}
      - TMDB_ACCESS_TOKEN=${TMDB_ACCESS_TOKEN}
      - DATA_FOLDER=/data
    volumes:
      - jackettio-data:/data
    networks:
      - heartstream-network

  # ── HeartStream ───────────────────────────────────────────────────────────────
  heartstream:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: heartstream-v2
    restart: unless-stopped
    depends_on:
      - jackett
      - jackettio
      - mediaflow
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_ACCESS_TOKEN=${TMDB_ACCESS_TOKEN}
      - JACKETTIO_URL=http://jackettio:4000
      - REALDEBRID_API_KEY=${REALDEBRID_API_KEY}
      - JACKETTIO_INDEXERS=${JACKETTIO_INDEXERS:-thepiratebay,yts,eztv,therarbg}
      - JACKETTIO_QUALITIES=${JACKETTIO_QUALITIES:-720,1080,2160}
      - MEDIAFLOW_PUBLIC_URL=${MEDIAFLOW_PUBLIC_URL:-}
      - MEDIAFLOW_API_PASSWORD=${MEDIAFLOW_API_PASSWORD:-heartstream}
    volumes:
      - heartstream-data:/data
    networks:
      - heartstream-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  jackettio-data:
  heartstream-data:

networks:
  heartstream-network:
    driver: bridge
